<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>قمرة قيادة سيارة FPV</title>
    
    <!-- Icons -->
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="img/icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/icon.png">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="video-container">
        <!-- Placeholder för WebRTC-video ström -->
        <img id="fpv-video" class="hidden-video">
        <div id="video-overlay" class="vignette"></div>
        
        <!-- Offline Status Overlay -->
        <div id="status-overlay" class="status-overlay">
            <div class="status-message" dir="rtl">
                إشارة ضعيفة أو السيارة مطfأة
                <br>
                <button id="btn-reconnect" class="reconnect-btn">إعادة الاتصال 🔃</button>
            </div>
        </div>
    </div>

    <button id="toggle-hud" class="hud-btn top-btn">
        <span class="icon">🛰️</span>
    </button>

    <div id="hud-controls" class="hidden">
        <div class="glass-panel top-telemetry">
            <div class="stat"><span>وقت القيادة:</span> <span id="drive-time" dir="ltr">00:00:00</span></div>
            <div class="stat"><span>البطارية:</span> <span id="battery-val" dir="ltr">0%</span></div>
        </div>

        <div id="steering-container" class="control-wrapper left">
             <div class="control-label">التوجيه</div>
             <div id="steering-wheel" class="wheel-element">
                <div class="wheel-rim"></div>
                <div class="wheel-marker"></div>
                <div class="inner-glow-ring"></div>
                <div class="wheel-spoke left"></div>
                <div class="wheel-spoke right"></div>
                <div class="wheel-spoke bottom-l"></div>
                <div class="wheel-spoke bottom-r"></div>
                <div class="wheel-center">
                    <div class="center-cap">
                        <span class="logo-text">القيادة</span>
                        <div class="center-decor"></div>
                    </div>
                </div>
             </div>
        </div>

        <div id="pedals-container" class="control-wrapper right">
             <div class="control-label">السرعة</div>
             <div id="pedal-gas" class="pedal gas">
                <div class="pedal-face">
                    <div class="speed-segment" data-speed="1.0"></div>
                    <div class="speed-segment" data-speed="0.7"></div>
                    <div class="speed-segment" data-speed="0.4"></div>
                    <div class="label">للأمام</div>
                </div>
             </div>
             <div id="pedal-brake" class="pedal brake">
                <div class="pedal-face">
                    <div class="speed-segment" data-speed="-1.0"></div>
                    <div class="speed-segment" data-speed="-0.7"></div>
                    <div class="speed-segment" data-speed="-0.4"></div>
                    <div class="label">للخلف</div>
                </div>
             </div>
        </div>

        <div class="action-buttons">
            <button id="btn-horn" class="hud-btn action-btn">
                <span class="icon">📢</span>
                <span class="label">بوق</span>
            </button>
            <button id="btn-light" class="hud-btn action-btn">
                <span class="icon">💡</span>
                <span class="label">إضاءة</span>
            </button>
        </div>
    </div>

    <!-- Bibliotek -->
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
